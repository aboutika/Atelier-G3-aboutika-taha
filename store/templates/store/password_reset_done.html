{% extends 'store/base.html' %}
{% block title %}Email envoyé{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 text-center">
        <div class="card p-5">
            <i class="fas fa-paper-plane fa-4x text-success mb-4"></i>
            <h2>Email envoyé !</h2>
            <p class="text-muted mt-3">Nous vous avons envoyé les instructions par email pour réinitialiser votre mot de passe. Si vous ne recevez rien, vérifiez vos spams.</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary mt-4">Retour à la connexion</a>
        </div>
    </div>
</div>
{% endblock %}
