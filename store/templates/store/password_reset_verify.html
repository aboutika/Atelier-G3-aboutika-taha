{% extends 'store/base.html' %}
{% block title %}Vérification du code{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0">
            <h2 class="text-center mb-4 font-weight-bold">Vérification</h2>
            <p class="text-muted text-center mb-4">Saisissez le code reçu et votre nouveau mot de passe.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Votre adresse email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Code secret (6 chiffres)</label>
                    <input type="text" name="code" class="form-control form-control-lg text-center font-weight-bold" maxlength="6" placeholder="000000" required>
                </div>
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <input type="password" name="new_password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-success btn-block btn-lg mt-4">Changer mon mot de passe</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'password_reset' %}" class="text-secondary">Renvoyer un code</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
