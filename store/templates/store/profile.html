{% extends 'store/base.html' %}
{% load bootstrap4 %}
{% block title %}Coordonnées Bancaires{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="bank-card p-5">
            <h1 class="text-center mb-5 font-weight-bold" style="color: #ffffff; font-size: 2.8rem; letter-spacing: -1px;">Coordonnées Bancaires</h1>
            
            <div class="info-alert mb-5">
                <div class="d-flex align-items-center">
                    <div class="info-icon-wrapper mr-3">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <p class="mb-0 info-text">
                        Vous devez renseigner ces informations pour pouvoir acheter ou louer des mangas.
                    </p>
                </div>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group mb-4">
                    <label class="bank-label">Card number</label>
                    <input type="text" name="card_number" class="bank-input" placeholder="1234567812345678" maxlength="16" value="{{ user.card_number|default:'' }}" required>
                </div>

                <div class="form-group mb-4">
                    <label class="bank-label">Card expiry</label>
                    <input type="text" name="card_expiry" class="bank-input" placeholder="MM/YY" maxlength="5" value="{{ user.card_expiry|default:'' }}" required>
                </div>

                <div class="form-group mb-5">
                    <label class="bank-label">Card cvv</label>
                    <input type="text" name="card_cvv" class="bank-input" placeholder="123" maxlength="3" value="{{ user.card_cvv|default:'' }}" required>
                </div>

                <button type="submit" class="btn bank-btn btn-block">Enregistrer les informations</button>
            </form>
        </div>
    </div>
</div>

<style>
    .bank-card {
        background-color: #1a1d27;
        border-radius: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255,255,255,0.08);
    }

    .info-alert {
        background-color: #d1f1f7;
        border-radius: 10px;
        padding: 20px 25px;
        border: none;
    }

    .info-icon-wrapper {
        color: #084c61;
        font-size: 1.4rem;
    }

    .info-text {
        color: #084c61;
        font-size: 1.05rem;
        font-weight: 500;
        line-height: 1.4;
    }

    .bank-label {
        display: block;
        color: #f8f9fa;
        font-size: 1.1rem;
        margin-bottom: 12px;
        font-weight: 500;
    }

    .bank-input {
        width: 100%;
        background-color: #12141d;
        border: 1px solid #2d323e;
        border-radius: 12px;
        padding: 16px 20px;
        color: #ffffff;
        font-size: 1.15rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bank-input:focus {
        outline: none;
        border-color: #3d9af2;
        background-color: #161925;
        box-shadow: 0 0 0 4px rgba(61, 154, 242, 0.15);
    }

    .bank-input::placeholder {
        color: #4a5568;
        opacity: 0.6;
    }

    .bank-btn {
        background-color: #3d9af2;
        color: #ffffff;
        border: none;
        border-radius: 15px;
        padding: 20px;
        font-size: 1.25rem;
        font-weight: 700;
        transition: all 0.3s;
        margin-top: 10px;
    }

    .bank-btn:hover {
        background-color: #2b8ae2;
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(61, 154, 242, 0.4);
        color: #ffffff;
    }

    /* Hide standard layout headers if any */
    #page-content-wrapper {
        padding-top: 0;
    }
</style>
{% endblock %}
