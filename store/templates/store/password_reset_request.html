{% extends 'store/base.html' %}
{% block title %}Réinitialiser le mot de passe{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0">
            <h2 class="text-center mb-4 font-weight-bold">Mot de passe oublié ?</h2>
            <p class="text-muted text-center mb-4">Entrez votre adresse email. Nous vous enverrons un <strong>code secret à 6 chiffres</strong>.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Votre adresse email</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="exemple@mail.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">Générer le code</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-secondary"><i class="fas fa-arrow-left mr-1"></i> Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
