{% extends 'store/base.html' %}
{% block title %}Mot de passe modifié{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 text-center">
        <div class="card p-5">
            <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
            <h2>Succès !</h2>
            <p class="text-muted mt-3">Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
            <a href="{% url 'login' %}" class="btn btn-primary mt-4">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
